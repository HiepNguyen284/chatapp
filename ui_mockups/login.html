<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .mobile-container {
            width: 375px; height: 812px;
            background-color: white;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="mobile-container shadow-2xl flex flex-col">
        <!-- Status Bar -->
        <div class="h-12 w-full flex justify-between items-center px-5 text-sm font-semibold pt-3 bg-white">
            <span>9:41</span>
            <div class="flex gap-1.5 items-center">
                <i class="fas fa-signal text-xs"></i>
                <i class="fas fa-wifi text-xs"></i>
                <i class="fas fa-battery-full text-xs"></i>
            </div>
        </div>

        <div class="flex-1 px-8 pt-16 flex flex-col">
            <!-- Logo -->
            <div class="w-full flex justify-center mb-8">
                <div class="w-24 h-24 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i class="fas fa-comments text-4xl"></i>
                </div>
            </div>
            
            <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">Xin chào!</h1>
            <p class="text-center text-gray-500 mb-10">Đăng nhập để tiếp tục với ChatApp</p>

            <!-- Form -->
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tên đăng nhập</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 bg-gray-50 text-gray-900 placeholder-gray-400" value="nguyenvana">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 bg-gray-50 text-gray-900" value="password123">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <i class="fas fa-eye text-gray-400"></i>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded" checked>
                        <label class="ml-2 block text-sm text-gray-700">Ghi nhớ</label>
                    </div>
                    <div class="text-sm">
                        <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Quên mật khẩu?</a>
                    </div>
                </div>

                <button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 mt-6">
                    Đăng nhập
                </button>
            </div>

            <div class="mt-8 text-center text-sm text-gray-600">
                Chưa có tài khoản? <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Đăng ký ngay</a>
            </div>
        </div>
    </div>
</body>
</html>
