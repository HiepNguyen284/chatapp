<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp ChatScreen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .mobile-container {
            width: 375px; height: 812px;
            background-color: #f8f9fa;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        .bubble-left { background-color: white; border-bottom-left-radius: 4px; }
        .bubble-right { background-color: #2563eb; color: white; border-bottom-right-radius: 4px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="mobile-container shadow-2xl">
        <!-- Status Bar -->
        <div class="h-12 w-full flex justify-between items-center px-5 text-sm font-semibold pt-3 bg-white z-10">
            <span>9:41</span>
            <div class="flex gap-1.5 items-center">
                <i class="fas fa-signal text-xs"></i>
                <i class="fas fa-wifi text-xs"></i>
                <i class="fas fa-battery-full text-xs"></i>
            </div>
        </div>

        <!-- AppBar -->
        <div class="h-16 bg-white border-b border-gray-200 flex items-center px-4 justify-between z-10">
            <div class="flex items-center gap-3">
                <i class="fas fa-arrow-left text-gray-600 text-lg"></i>
                <div class="relative">
                    <img src="https://ui-avatars.com/api/?name=Tran+Bao&background=0D8ABC&color=fff" class="w-10 h-10 rounded-full">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
                </div>
                <div>
                    <h2 class="font-bold text-gray-900 text-base leading-tight">Trần Bảo</h2>
                    <p class="text-xs text-green-500 font-medium">Đang hoạt động</p>
                </div>
            </div>
            <div class="flex gap-4 text-blue-600 text-xl">
                <i class="fas fa-phone"></i>
                <i class="fas fa-video"></i>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col">
            <div class="text-center text-xs text-gray-400 font-medium my-2">Hôm nay, 08:30</div>
            
            <!-- Received Message -->
            <div class="flex gap-2 items-end">
                <img src="https://ui-avatars.com/api/?name=Tran+Bao&background=0D8ABC&color=fff" class="w-7 h-7 rounded-full mb-1">
                <div class="max-w-[75%]">
                    <div class="bubble-left p-3 rounded-2xl shadow-sm text-sm text-gray-800 border border-gray-100">
                        Chào bạn, dự án ChatApp tiến độ tới đâu rồi?
                    </div>
                    <div class="text-[10px] text-gray-400 mt-1 ml-1">08:30</div>
                </div>
            </div>

            <!-- Sent Message -->
            <div class="flex justify-end items-end gap-1">
                <div class="max-w-[75%] flex flex-col items-end">
                    <div class="bubble-right p-3 rounded-2xl shadow-sm text-sm font-medium">
                        Mình đã hoàn thiện phần đăng nhập và tích hợp Firebase FCM rồi nhé. Đang làm tiếp UI phần Chat.
                    </div>
                    <div class="flex items-center gap-1 mt-1 mr-1">
                        <span class="text-[10px] text-gray-400">08:35</span>
                        <i class="fas fa-check-double text-blue-500 text-[10px]"></i>
                    </div>
                </div>
            </div>
            
            <!-- Received Image -->
            <div class="flex gap-2 items-end">
                <img src="https://ui-avatars.com/api/?name=Tran+Bao&background=0D8ABC&color=fff" class="w-7 h-7 rounded-full mb-1">
                <div class="max-w-[70%]">
                    <div class="bubble-left p-1 rounded-2xl shadow-sm border border-gray-100 bg-white">
                        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" class="rounded-xl w-full object-cover">
                    </div>
                    <div class="text-[10px] text-gray-400 mt-1 ml-1">08:42</div>
                </div>
            </div>

            <!-- Typing indicator -->
            <div class="flex gap-2 items-end mt-2">
                <img src="https://ui-avatars.com/api/?name=Tran+Bao&background=0D8ABC&color=fff" class="w-7 h-7 rounded-full mb-1">
                <div class="bubble-left px-4 py-3 rounded-2xl shadow-sm border border-gray-100 bg-white flex gap-1 items-center">
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>
        </div>

        <!-- Input Bar -->
        <div class="h-16 bg-white border-t border-gray-200 px-3 flex items-center gap-2 pb-2 pt-2">
            <button class="w-10 h-10 rounded-full text-blue-600 hover:bg-blue-50 flex items-center justify-center text-xl transition-colors">
                <i class="fas fa-plus-circle"></i>
            </button>
            <div class="flex-1 bg-gray-100 rounded-full h-10 flex items-center px-4">
                <input type="text" class="bg-transparent border-none outline-none w-full text-sm placeholder-gray-500" placeholder="Nhập tin nhắn...">
                <i class="far fa-face-smile text-gray-400 text-lg ml-2"></i>
            </div>
            <button class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-md">
                <i class="fas fa-paper-plane text-sm ml-[-2px]"></i>
            </button>
        </div>
    </div>
</body>
</html>
