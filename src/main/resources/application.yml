logging:
  level:
    org.hibernate.SQL: "TRACE"

spring:
  application:
    name: "chatapp"

  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"

  jpa:
    hibernate:
      ddl-auto: "update"

    open-in-view: false

  output:
    ansi:
      enabled: "ALWAYS"

  servlet:
    multipart:
      enabled: true
      max-file-size: "100MB"
      max-request-size: "150MB"
      file-size-threshold: "2KB"

server:
  port: "${PORT:8080}"

jwts:
  secret: "${JWTS_SECRET}"

  access-token-lifetime: "PT30M" # 30 minutes
  refresh-token-lifetime: "P30D" # 30 days

rustfs:
  endpoint: "${RUSTFS_ENDPOINT:http://localhost:9000}"
  public-url: "${RUSTFS_PUBLIC_URL:/storage}"
  access-key: "${RUSTFS_ACCESS_KEY}"
  secret-key: "${RUSTFS_SECRET_KEY}"
  bucket-name: "${RUSTFS_BUCKET_NAME}"
