logging:
  level:
    org.hibernate.SQL: "TRACE"

spring:
  application:
    name: "chatapp"

  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"

  jpa:
    hibernate:
      ddl-auto: "update"

    open-in-view: false

  output:
    ansi:
      enabled: "ALWAYS"

  servlet:
    multipart:
      enabled: true
      max-file-size: "100MB"
      max-request-size: "150MB"
      file-size-threshold: "2KB"

server:
  port: "${PORT:8080}"

jwts:
  secret: "${JWTS_SECRET}"

  access-token-lifetime: "PT30M" # 30 minutes
  refresh-token-lifetime: "P30D" # 30 days

s3:
  endpoint: "${S3_ENDPOINT:http://localhost:9000}"
  public-url: "${S3_PUBLIC_URL:/storage}"
  access-key: "${S3_ACCESS_KEY}"
  secret-key: "${S3_SECRET_KEY}"
  bucket-name: "${S3_BUCKET_NAME}"

translation:
  kilo:
    base-url: "${KILO_BASE_URL:https://api.kilo.ai/api/gateway}"
    model: "${KILO_MODEL:anthropic/claude-sonnet-4.5}"
    api-key: "${KILO_API_KEY:}"
    request-timeout-seconds: "${KILO_REQUEST_TIMEOUT_SECONDS:45}"

chatbot:
  kilo:
    model: "${CHATBOT_MODEL:${KILO_MODEL:anthropic/claude-sonnet-4.5}}"
    stream-timeout-seconds: "${CHATBOT_STREAM_TIMEOUT_SECONDS:120}"

speech-to-text:
  whisper:
    base-url: "${WHISPER_BASE_URL:http://whisper:8000}"
    request-timeout-seconds: "${WHISPER_REQUEST_TIMEOUT_SECONDS:60}"
  default-language: "${WHISPER_DEFAULT_LANGUAGE:vi}"
  max-audio-size-bytes: "${WHISPER_MAX_AUDIO_SIZE_BYTES:12582912}"
