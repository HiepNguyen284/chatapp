logging:
  level:
    org.hibernate.SQL: "TRACE"
    com.group4.chatapp.configs.FirebaseConfig: "INFO"
    com.group4.chatapp.services.NotificationService: "INFO"

spring:
  application:
    name: "chatapp"

  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"

  jpa:
    hibernate:
      ddl-auto: "update"

    open-in-view: false

  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"

  mail:
    host: "${SMTP_HOST:smtp.gmail.com}"
    port: "${SMTP_PORT:587}"
    username: "${SMTP_USERNAME:}"
    password: "${SMTP_PASSWORD:}"
    from: "${SMTP_FROM_EMAIL:noreply@chatapp.com}"
    from-name: "${SMTP_FROM_NAME:ChatApp}"
    properties:
      "mail.smtp.auth": true
      "mail.smtp.starttls.enable": true
      "mail.smtp.starttls.required": true
      "[mail.smtp.connectiontimeout]": 5000
      "[mail.smtp.timeout]": 3000
      "[mail.smtp.writetimeout]": 5000

  output:
    ansi:
      enabled: "ALWAYS"

  servlet:
    multipart:
      enabled: true
      max-file-size: "100MB"
      max-request-size: "150MB"
      file-size-threshold: "2KB"

server:
  port: "${PORT:8080}"

jwts:
  secret: "${JWTS_SECRET}"

  access-token-lifetime: "PT30M" # 30 minutes
  refresh-token-lifetime: "P30D" # 30 days

s3:
  endpoint: "${S3_ENDPOINT:http://localhost:9000}"
  public-url: "${S3_PUBLIC_URL:/storage}"
  access-key: "${S3_ACCESS_KEY}"
  secret-key: "${S3_SECRET_KEY}"
  bucket-name: "${S3_BUCKET_NAME}"

agents:
  messages:
    base-url: "${LLM_BASE_URL}"
    model: "${LLM_MODEL}"
    fallback-model: "${LLM_FALLBACK_MODEL:kilo-auto/free}"
    api-key: "${LLM_API_KEY}"
    request-timeout-seconds: "${LLM_REQUEST_TIMEOUT_SECONDS:45}"

  chatbot:
    model: "${CHATBOT_MODEL:${agents.messages.model:}}"
    stream-timeout-seconds: "${CHATBOT_STREAM_TIMEOUT_SECONDS:120}"

speech-to-text:
  whisper:
    base-url: "${WHISPER_BASE_URL:http://whisper:8000}"
    request-timeout-seconds: "${WHISPER_REQUEST_TIMEOUT_SECONDS:60}"
    healthcheck-enabled: "${WHISPER_HEALTHCHECK_ENABLED:false}"
  default-language: "${WHISPER_DEFAULT_LANGUAGE:auto}"
  max-audio-size-bytes: "${WHISPER_MAX_AUDIO_SIZE_BYTES:12582912}"

firebase:
  service-account-json: "${FIREBASE_SERVICE_ACCOUNT_JSON:}"
  service-account-path: "${FIREBASE_SERVICE_ACCOUNT_PATH:}"

websocket:
  relay_host: "${WEBSOCKET_RELAY_HOST:artemis}"
  relay_port: "${WEBSOCKET_RELAY_PORT:61613}"

password-reset:
  token-expiry-minutes: "${PASSWORD_RESET_TOKEN_EXPIRY_MINUTES:30}"
  frontend-url: "${PASSWORD_RESET_FRONTEND_URL:http://localhost:3000/reset-password}"
