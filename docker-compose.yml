services:
  postgres:
    image: postgres:18-alpine
    container_name: chatapp-postgres

    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: chatapp-rustfs

    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - rustfs_data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: chatapp-app

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/chatapp
      DB_USERNAME: chatapp
      DB_PASSWORD: chatapp

      RUSTFS_URL: http://rustfs:9000
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_BUCKET_NAME: chatapp

      FILE_STORAGE_PROVIDER: rustfs

    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy

volumes:
  postgres_data:
  rustfs_data:
