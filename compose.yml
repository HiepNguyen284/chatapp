  #     interval: 15s
  #     timeout: 5s
  #     start_period: 5m
  #     retries: 20

  redis:
    image: redis:8-alpine
    container_name: chatapp-redis

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  artemis:
    image: apache/artemis:2.53.0-alpine
    container_name: chatapp-artemis

    environment:
      ANONYMOUS_LOGIN: true

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8161"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: chatapp-app
    env_file:
      - ./.env

    volumes:
      - ./secrets:/secrets:ro

    depends_on:
      artemis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      versitygw:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  versitygw_data:
  whisper_model_cache:
