services:
  gateway:
    image: caddy:2-alpine
    container_name: chatapp-gateway

    ports:
      - 8080:8080

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

    depends_on:
      app:
        condition: service_started
      versitygw:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: chatapp-postgres
    env_file:
      - ./.env

    volumes:
      - ./.postgres:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "chatapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  versitygw:
    image: versity/versitygw:latest
    container_name: chatapp-versitygw

    env_file:
      - ./.env

    volumes:
      - versitygw_data:/versity/data

    environment:
      ROOT_ACCESS_KEY: ${S3_ACCESS_KEY}
      ROOT_SECRET_KEY: ${S3_SECRET_KEY}
      VGW_CORS_ALLOW_ORIGIN: "*"

    command: --port :9000 --health /health posix /versity/data

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

