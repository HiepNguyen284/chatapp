services:
  gateway:
    image: caddy:2-alpine
    container_name: chatapp-gateway

    env_file:
      - ./.env

    ports:
      - 8080:8080

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

    depends_on:
      app:
        condition: service_started
      versitygw:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: chatapp-postgres
    env_file:
      - ./.env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  versitygw:
    image: versity/versitygw:latest
    container_name: chatapp-versitygw

    env_file:
      - ./.env

    ports:
      - "9001:9000"

    volumes:
      - versitygw_data:/versity/data

    environment:
      - VGW_CORS_ALLOW_ORIGIN=*

    command: --port :9000 --access ${S3_ACCESS_KEY} --secret ${S3_SECRET_KEY} --health /health posix /versity/data

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: chatapp-app
    env_file:
      - ./.env

    depends_on:
      postgres:
        condition: service_healthy
      versitygw:
        condition: service_healthy

volumes:
  postgres_data:
  versitygw_data:
