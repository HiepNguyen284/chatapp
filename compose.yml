services:
  gateway:
    image: caddy:2-alpine
    container_name: chatapp-gateway

    env_file:
      - ./.env

    ports:
      - 8080:8080

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

    depends_on:
      app:
        condition: service_started
      rustfs:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: chatapp-postgres
    env_file:
      - ./.env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: chatapp-rustfs

    env_file:
      - ./.env

    ports:
      - "9001:9001"

    volumes:
      - rustfs_data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: chatapp-app
    env_file:
      - ./.env

    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy

volumes:
  postgres_data:
  rustfs_data:
