services:
  gateway:
    image: caddy:2-alpine
    container_name: chatapp-gateway

    env_file:
      - ./.env

    ports:
      - 8080:8080

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

    depends_on:
      app:
        condition: service_started
      versitygw:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: chatapp-postgres
    env_file:
      - ./.env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  versitygw:
    image: versity/versitygw:latest
    container_name: chatapp-versitygw

    env_file:
      - ./.env

    ports:
      - "9001:9000"

    volumes:
      - versitygw_data:/versity/data

    environment:
      ROOT_ACCESS_KEY: ${S3_ACCESS_KEY}
      ROOT_SECRET_KEY: ${S3_SECRET_KEY}
      VGW_CORS_ALLOW_ORIGIN: "*"

    command: --port :9000 --health /health posix /versity/data

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  whisper:
    build:
      context: ./whisper_service
      dockerfile: Dockerfile

    container_name: chatapp-whisper

    env_file:
      - ./.env

    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_CACHE_DIR: ${WHISPER_CACHE_DIR:-/cache/whisper}
      WHISPER_DEFAULT_LANGUAGE: ${WHISPER_DEFAULT_LANGUAGE:-auto}
      WHISPER_MAX_AUDIO_SIZE_BYTES: ${WHISPER_MAX_AUDIO_SIZE_BYTES:-12582912}
      WHISPER_FP16: ${WHISPER_FP16:-false}

    volumes:
      - whisper_model_cache:/cache/whisper

    ports:
      - "8000:8000"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      start_period: 5m
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: chatapp-app
    env_file:
      - ./.env

    depends_on:
      postgres:
        condition: service_healthy
      versitygw:
        condition: service_healthy
      whisper:
        condition: service_healthy

volumes:
  postgres_data:
  versitygw_data:
  whisper_model_cache:
